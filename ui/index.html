<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>代理控制台</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <a href="#main-content" class="skip-link">跳到主内容</a>
    <main class="shell" id="main-content">
      <header class="hero">
        <div class="hero-left">
          <h1>代理控制台</h1>
          <div class="hero-subtitle">
            <span id="sync-status" data-testid="sync-status" aria-live="polite">等待同步</span>
            <span id="last-sync-time" data-testid="last-sync-time">最后同步：--</span>
            <span id="proxy-state-label" data-testid="proxy-state-label" class="hint" style="min-height:0;margin:0;">代理状态：检查中...</span>
          </div>
        </div>
        <div class="hero-actions" aria-label="顶部操作">
          <button id="refresh" data-testid="sync-now" type="button">立即同步</button>
          <button id="test-all-btn" data-testid="test-all-delay" type="button">全部延时</button>
          <button id="expand-toggle-btn" data-testid="expand-toggle" type="button">全部展开</button>
          <span id="speedtest-progress" class="speedtest-progress"></span>
        </div>
      </header>

      <div id="mode-banner" class="mode-banner" data-testid="mode-banner" aria-live="polite"></div>

      <section class="route-panel" aria-label="实际路由标签">
        <h2 class="route-panel-title">实际路由标签</h2>
        <div id="route-track" class="route-track" data-testid="route-track" aria-label="实际路由标签"></div>
      </section>

      <section class="top-grid" data-testid="top-status-bar" aria-label="顶部控制区">
        <div class="panel">
          <h2 class="section-heading">
            <svg class="section-icon" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="5" y="7" width="14" height="10" rx="2"></rect>
              <path d="M9 7V4"></path>
              <path d="M15 7V4"></path>
              <circle cx="9" cy="12" r="1"></circle>
              <circle cx="15" cy="12" r="1"></circle>
              <path d="M8 17v2"></path>
              <path d="M16 17v2"></path>
            </svg>
            <span>自动代理选择器</span>
          </h2>
          <label class="capability-title" for="auto-group-select">自动组代理选择器</label>
          <select id="auto-group-select" data-testid="auto-group-select"></select>
          <p id="manual-status" class="hint"></p>
        </div>
        <div class="panel">
          <p id="readonly-auto-note" class="hint" data-testid="readonly-auto-note">自动组不可手动选择，请去对应手动组选择</p>
          <p id="status" class="hint" aria-live="polite">初始化中...</p>
          <div class="proxy-toggle-bar">
            <button id="proxy-toggle-btn" data-testid="proxy-toggle" type="button">关闭代理</button>
            <button id="restart-singbox-btn" data-testid="restart-singbox" type="button">重启 sing-box 内核</button>
          </div>
        </div>
      </section>

      <div id="sections" class="sections"></div>
    </main>
    <script type="module" src="/app.mjs"></script>
  </body>
</html>
