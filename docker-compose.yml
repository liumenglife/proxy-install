services:
  sing-box:
    image: ${SING_BOX_IMAGE}
    container_name: sing-box
    command: run -c /etc/sing-box/config.json
    restart: unless-stopped
    network_mode: "host"
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    volumes:
      - ${SING_BOX_CONFIG_DIR}:/etc/sing-box
      - ${SUB_STORE_DATA_DIR}:/etc/sub-store:ro
    environment:
      - TZ=Asia/Shanghai

  sub-store:
    build:
      context: .
      dockerfile: Dockerfile.sub-store
      args:
        BASE_IMAGE: ${SUB_STORE_BASE_IMAGE}
        SUB_STORE_PUBLIC_API: http://${MY_IP}:9002
    image: ${SUB_STORE_IMAGE}
    container_name: sub-store
    restart: unless-stopped
    ports:
      - "9001:3001"
      - "9002:3000"
    volumes:
      - ${SUB_STORE_DATA_DIR}:/opt/app/data
    environment:
      - TZ=Asia/Shanghai
      - SUB_STORE_DATA_BASE_PATH=/opt/app/data
      - SUB_STORE_FRONTEND_BACKEND_PATH=/

  proxy-ui:
    build:
      context: .
      dockerfile: Dockerfile.proxy-ui
    image: ${PROXY_UI_IMAGE}
    container_name: proxy-ui
    restart: unless-stopped
    ports:
      - "9091:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - TZ=Asia/Shanghai
      - CONTROL_AGENT_BASE=http://control-agent:3000
      - CONTROL_AGENT_URL=http://control-agent:3000

  control-agent:
    build:
      context: .
      dockerfile: Dockerfile.control-agent
    image: ${CONTROL_AGENT_IMAGE:-proxy-install/control-agent:latest}
    container_name: control-agent
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - TZ=Asia/Shanghai
      - CLASH_API_BASE=http://host.docker.internal:9090
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
